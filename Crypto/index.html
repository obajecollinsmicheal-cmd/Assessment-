<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Token Launch Countdown</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>Token Launch Countdown</h1>
      <p class="lead">Set the target date and watch the live countdown. Subscribe to updates.</p>
    </header>

    <section class="controls card">
      <label for="target">Target date & time</label>
      <input id="target" type="datetime-local">
      <div class="buttons">
        <button id="setBtn">Set Target</button>
        <button id="nowBtn" class="muted">Use Now + 1 min (test)</button>
      </div>
    </section>

    <section class="countdown card">
      <div class="time-grid">
        <div class="time-item"><div id="days" class="time-number">0</div><div class="time-label">Days</div></div>
        <div class="time-item"><div id="hours" class="time-number">0</div><div class="time-label">Hours</div></div>
        <div class="time-item"><div id="minutes" class="time-number">0</div><div class="time-label">Minutes</div></div>
        <div class="time-item"><div id="seconds" class="time-number">0</div><div class="time-label">Seconds</div></div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar-bg"><div id="progressBar" class="progress-bar"></div></div>
        <div id="progressLabel" class="progress-label">Progress: 0%</div>
      </div>

      <div id="status" class="status muted">No target set</div>
    </section>

    <section class="subscribe card">
      <form id="subscribeForm">
        <label for="email">Subscribe for launch updates</label>
        <div class="subscribe-row">
          <input id="email" type="email" placeholder="you@example.com" required>
          <button type="submit">Subscribe</button>
        </div>
      </form>
    </section>

    <footer class="footer muted small">This is a demo. No emails are sent — subscription is simulated.</footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
